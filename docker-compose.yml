version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: Organization
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12581258
    ports:
      - "5432:5432"
    networks:
      - django_network
  
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_NAME=Organization
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12581258
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_HOST_AUTH_METHOD=trust
    depends_on:
      - db
    networks:
      - django_network 

volumes:
  postgres_data:

networks:
  django_network:
    driver: bridge


